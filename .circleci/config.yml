# This config was automatically generated from your source code
# Stacks detected: cicd:github-actions:.github/workflows,deps:node:.
version: 2.1
orbs:
  node: circleci/node@5
jobs:
  test-node:
    # Install node dependencies and run tests
    executor: node/default
    steps:
      - checkout
      - node/install-packages:
          cache-path: ~/project/node_modules
          override-ci-command: npm install
      - run:
          name: Run tests
          command: npm test --passWithNoTests
  build-node:
    # Build node project
    executor: node/default
    retention:
      caches: 7d
    steps:
      - checkout
      - node/install-packages:
          cache-path: ~/project/node_modules
          override-ci-command: npm install
      - restore_cache:
          keys:
            - studio-next-cache-v1-{{ checksum "pnpm-lock.yaml" }}-{{ .Revision }}
            - studio-next-cache-v1-{{ checksum "pnpm-lock.yaml" }}-
      - run:
          command: |
            npm run build
            npm run build --workspace=@uykulukscifi/studio
      - save_cache:
          key: studio-next-cache-v1-{{ checksum "pnpm-lock.yaml" }}-{{ .Revision }}
          paths:
            - apps/studio/.next/cache
      - run:
          name: Create the ~/artifacts directory if it doesn't exist
          command: mkdir -p ~/artifacts
      # Copy output to artifacts dir
      - run:
          name: Copy artifacts
          command: cp -R build dist public .output .next .docusaurus ~/artifacts 2>/dev/null || true
      - store_artifacts:
          path: ~/artifacts
          destination: node-build
  preview-deploy-marker:
    # Explicitly gated scaffold; intentionally not included in a workflow.
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Verify preview deploy marker prerequisites
          command: |
            if [ "${PREVIEW_DEPLOY_ENABLED:-}" != "true" ]; then
              echo "PREVIEW_DEPLOY_ENABLED=true is required to run preview deploy markers."
              exit 1
            fi
            if [ ! -x scripts/deploy/preview.sh ]; then
              echo "scripts/deploy/preview.sh must exist and be executable."
              exit 1
            fi
      - run:
          name: Plan preview deployment marker
          command: scripts/deploy/preview.sh plan-marker
      - run:
          name: Update preview deployment marker
          command: scripts/deploy/preview.sh update-marker
      - run:
          name: Run preview deployment marker
          command: scripts/deploy/preview.sh run-marker
workflows:
  build-and-test:
    jobs:
      - test-node
      - build-node:
          requires:
            - test-node
