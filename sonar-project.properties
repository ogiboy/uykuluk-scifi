# SonarCloud project defaults.
# Local SonarQube scans override host, project key, and project name through scripts/qa/run_sonar_scan.sh.
sonar.projectKey=ogiboy_uykuluk-scifi
sonar.projectName=uykuluk-scifi
sonar.organization=ogiboy
sonar.projectDescription=Approval-gated local-first YouTube producer workflow with TypeScript CLI, evidence bundles, and planned Next.js Producer Studio.
sonar.sourceEncoding=UTF-8

sonar.sources=src,scripts,apps/studio/src
sonar.tests=tests
sonar.javascript.lcov.reportPaths=.ai/qa/artifacts/sonar/coverage/lcov.info

sonar.exclusions=**/node_modules/**,**/.next/**,**/out/**,**/dist/**,**/build/**,**/.git/**,**/.sonar/**,**/.scannerwork/**,runs/**,.ai/qa/artifacts/**,assets/**/*.png,assets/**/*.jpg,assets/**/*.jpeg
# CLI entrypoints/adapters are exercised through subprocess tests; V8 lcov does not collect spawned CLI coverage.
sonar.coverage.exclusions=.ai/**,tests/**,scripts/**,src/cli.ts,src/cli/**,apps/studio/**,assets/**,eslint.config.js,vitest.config.ts,playwright.config.ts
sonar.cpd.exclusions=tests/**,.ai/**,assets/**
sonar.issues.issueResolution.enabled=true
