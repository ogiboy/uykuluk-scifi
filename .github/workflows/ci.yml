name: CI

on:
  push:
    branches: [main, "feature/**", "feat/**", "fix/**", "docs/**", "ci/**", "chore/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up pnpm
        uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run full project check
        run: pnpm check

      - name: Audit high-severity dependency vulnerabilities
        run: pnpm security:dependencies

      - name: Run usage smoke
        run: pnpm qa:usage

      - name: Install Playwright browser
        run: pnpm exec playwright install chromium

      - name: Run browser smoke
        run: pnpm qa:browser

      - name: Print version plan
        run: pnpm version:plan
