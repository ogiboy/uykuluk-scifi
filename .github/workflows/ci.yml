name: CI

on:
  push:
    branches: [main, "feature/**", "feat/**", "fix/**", "docs/**", "ci/**", "chore/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run full project check
        run: pnpm check

      - name: Run usage smoke
        run: pnpm qa:usage

      - name: Install Playwright browser
        run: pnpm exec playwright install chromium

      - name: Run browser smoke
        run: pnpm qa:browser

      - name: Print version plan
        run: pnpm version:plan
