name: SonarQube

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "apps/studio/**"
      - "scripts/**"
      - "tests/**"
      - "sonar-project.properties"
      - "package.json"
      - "pnpm-lock.yaml"

permissions:
  contents: read

jobs:
  scan:
    name: Sonar Scan
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Skip when Sonar token is unavailable
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "SONAR_TOKEN is not configured; skipping Sonar scan."

      - name: Check out repository
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Set up pnpm
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271

      - name: Set up Node
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        if: ${{ env.SONAR_TOKEN != '' }}
        run: pnpm install --frozen-lockfile

      - name: Generate coverage
        if: ${{ env.SONAR_TOKEN != '' }}
        run: pnpm test:coverage

      - name: Run Sonar scanner
        if: ${{ env.SONAR_TOKEN != '' }}
        env:
          SONAR_SKIP_COVERAGE: "1"
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY || 'ogiboy_uykuluk-scifi' }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION || 'ogiboy' }}
        run: pnpm sonar:cloud
