name: SonarQube

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "apps/studio/**"
      - "scripts/**"
      - "tests/**"
      - "sonar-project.properties"
      - "package.json"
      - "pnpm-lock.yaml"

permissions:
  contents: read

jobs:
  scan:
    name: Sonar Scan
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Skip when Sonar token is unavailable
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "SONAR_TOKEN is not configured; skipping Sonar scan."

      - name: Check out repository
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Set up pnpm
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34

      - name: Set up Node
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        if: ${{ env.SONAR_TOKEN != '' }}
        run: pnpm install --frozen-lockfile

      - name: Generate coverage
        if: ${{ env.SONAR_TOKEN != '' }}
        run: pnpm test:coverage

      - name: Run Sonar scanner
        if: ${{ env.SONAR_TOKEN != '' }}
        env:
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY || 'ogiboy_uykuluk-scifi' }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION || 'ogiboy' }}
        run: pnpm sonar:cloud
